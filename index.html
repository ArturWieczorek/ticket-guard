    <style>
      :root {
        --ink: #1d2b36;
        --oat: #ede6d6;
        --oat-deep: #e1d7bf;
        --brass: #b8934a;
        --forest: #3f6e52;
        --stamp-red: #a13d3d;
        --paper: #f7f3e9;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--oat);
        color: var(--ink);
        font-family:
          "IBM Plex Sans",
          -apple-system,
          sans-serif;
        min-height: 100vh;
      }
      @font-face {
        font-family: "FraunFallback";
        src: local("Georgia");
      }
      h1,
      h2,
      h3 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
        margin: 0;
      }
      .topbar {
        background: var(--ink);
        color: var(--paper);
        padding: 18px 20px;
        display: flex;
        align-items: baseline;
        gap: 10px;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .topbar .brand {
        font-family: "Fraunces", Georgia, serif;
        font-size: 22px;
        letter-spacing: 0.3px;
      }
      .topbar .brand span {
        color: var(--brass);
      }
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--paper);
        border-bottom: 1px solid var(--oat-deep);
      }
      .tab {
        flex: 1;
        text-align: center;
        padding: 14px 8px;
        cursor: pointer;
        font-size: 14px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #8a8272;
        border-bottom: 3px solid transparent;
        user-select: none;
      }
      .tab.active {
        color: var(--ink);
        border-bottom: 3px solid var(--brass);
        font-weight: 600;
      }
      .panel {
        max-width: 640px;
        margin: 0 auto;
        padding: 22px 18px 60px;
      }
      label {
        display: block;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: #6b6455;
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="number"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--oat-deep);
        border-radius: 6px;
        font-size: 16px;
        background: var(--paper);
        color: var(--ink);
        margin-bottom: 16px;
      }
      input:focus {
        outline: 2px solid var(--brass);
        outline-offset: 1px;
      }
      button {
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        padding: 13px 20px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        letter-spacing: 0.2px;
      }
      .btn-primary {
        background: var(--ink);
        color: var(--paper);
        width: 100%;
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-secondary {
        background: transparent;
        color: var(--ink);
        border: 1.5px solid var(--ink);
      }
      .card {
        background: var(--paper);
        border: 1px solid var(--oat-deep);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .event-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        background: var(--paper);
        border: 1px solid var(--oat-deep);
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      .event-row:hover {
        border-color: var(--brass);
      }
      .event-row .meta {
        font-size: 13px;
        color: #7a7364;
      }
      .ticket-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 18px;
      }
      @media (max-width: 480px) {
        .ticket-grid {
          grid-template-columns: 1fr;
        }
      }
      .ticket {
        background: var(--paper);
        border: 2px dashed var(--brass);
        border-radius: 4px;
        padding: 14px;
        text-align: center;
        position: relative;
      }
      .ticket .ticket-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #8a8272;
        margin-bottom: 2px;
      }
      .ticket .num {
        font-family: "Fraunces", Georgia, serif;
        font-size: 34px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: 1px;
        line-height: 1.1;
        margin-bottom: 8px;
      }
      .ticket .code {
        font-family: "Courier New", monospace;
        font-size: 18px;
        font-weight: 700;
        color: var(--forest);
        letter-spacing: 3px;
        margin-bottom: 8px;
      }
      .ticket canvas,
      .ticket img {
        max-width: 100%;
        height: auto;
      }
      .ticket .event-name {
        font-size: 12px;
        margin-top: 6px;
        color: var(--ink);
        font-weight: 600;
      }
      .ticket.used {
        opacity: 0.5;
        border-color: var(--stamp-red);
      }
      .ticket .used-stamp {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-16deg);
        border: 3px solid var(--stamp-red);
        color: var(--stamp-red);
        font-family: "Fraunces", Georgia, serif;
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 2px 10px;
        border-radius: 4px;
        opacity: 0.9;
        pointer-events: none;
      }
      .scan-stage {
        position: relative;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        aspect-ratio: 1/1;
      }
      .scan-stage video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .scan-frame {
        position: absolute;
        inset: 14%;
        border: 3px solid rgba(247, 243, 233, 0.8);
        border-radius: 12px;
        pointer-events: none;
      }
      .result-banner {
        margin-top: 18px;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-family: "Fraunces", Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        display: none;
      }
      .result-banner.valid {
        background: var(--forest);
        color: white;
        display: block;
      }
      .result-banner.invalid {
        background: var(--stamp-red);
        color: white;
        display: block;
      }
      .result-banner .sub {
        font-family: "IBM Plex Sans", sans-serif;
        font-size: 14px;
        font-weight: 400;
        margin-top: 6px;
        opacity: 0.9;
      }
      .stats {
        display: flex;
        gap: 10px;
        margin-top: 14px;
        font-size: 13px;
        color: #6b6455;
      }
      .stats b {
        color: var(--ink);
        font-size: 16px;
      }
      .empty {
        text-align: center;
        padding: 40px 20px;
        color: #8a8272;
      }
      @media print {
        .topbar,
        .tabs,
        .no-print {
          display: none !important;
        }
        body {
          background: white;
        }
        .ticket {
          break-inside: avoid;
        }
      }
    </style>
  </head>

    <div id="login-screen" style="max-width: 360px; margin: 60px auto; padding: 0 18px">
      <div class="card">
        <h3 style="margin-bottom: 14px" data-i18n="login_title">Staff sign-in</h3>
        <label data-i18n="email">Email</label>
        <input type="text" id="login-email" autocomplete="username" inputmode="email" />
        <label data-i18n="password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" />
        <button class="btn-primary" id="btn-login" data-i18n="signin">Sign in</button>
        <div
          id="login-status"
          style="margin-top: 10px; font-size: 13px; min-height: 18px; color: var(--stamp-red)"
        ></div>
      </div>
    </div>

    <div id="app-content" style="display: none">
      <div class="tabs no-print">
        <div class="tab active" data-tab="generate" data-i18n="tab_generate">Generate</div>
        <div class="tab" data-tab="scan" data-i18n="tab_scan">Scan door</div>
      </div>

      <div
        id="storage-banner"
        class="no-print"
        style="
          display: none;
          background: var(--brass);
          color: var(--ink);
          font-size: 13px;
          padding: 10px 16px;
          text-align: center;
        "
      ></div>

      <div class="panel" id="panel-generate"></div>
      <div class="panel" id="panel-scan" style="display: none"></div>
    </div>

          cant_verify: "Can't verify",
          cant_verify_sub: "No connection to the database - use the printed backup list to check this ticket.",
          cant_verify_auth: "Sign-in or permissions problem - sign out and back in, then try again.",
          no_events_scan: "No events yet - create one in the Generate tab first.",
          pick_event_first: "Pick an event first",
          camera_unavailable: "Camera unavailable",
          camera_denied:
            "Permission denied or no camera found. If you opened this inside a chat window, try opening the app in its own browser tab.",
          valid_welcome: "Valid - welcome!",
          checked_in_num: (n) => `Ticket ${n} checked in.`,
          already_used: "ALREADY USED",
          checked_at: (when) => `Checked in at ${when}. Possible duplicate.`,
          unknown_ticket: "Unknown ticket",
          unknown_ticket_sub: "This code doesn't match any ticket on file - likely a fake.",
          not_ticketguard: "Not a TicketGuard code",
          not_ticketguard_sub: "This QR code was not generated by this app.",
          malformed_sub: "This QR code is missing or has a malformed ticket id.",
          wrong_event: "Wrong event",
          wrong_event_sub: "This ticket belongs to a different event.",
          unknown_offline: "Unknown ticket (offline)",
          unknown_offline_sub: "Not on the list loaded for this event - can't confirm while offline.",
          already_used_offline: "ALREADY USED (offline)",
          marked_used_at: (when) => `Marked used at ${when} on this phone.`,
          valid_offline: "Valid - welcome! (offline)",
          checked_in_offline: (n) => `Ticket ${n} checked in - will confirm once back online.`,
          auth_problem: (n) =>
            `<b>Sign-in or permissions problem</b> - this isn't just a dead wifi signal; check-ins may not confirm even once you have signal back. Try signing out and back in. (${n} check-in(s) still waiting to confirm.)`,
          offline_saving: (n) => `Offline - ${n} check-in(s) saving on this phone, will confirm once reconnected.`,
          conflict_note: (n, list) =>
            `⚠ ${n} ticket(s) turned out to be checked in elsewhere too - please recheck: ${list}`,
          stats_line: (used, remaining, total) =>
            `<span><b>${used}</b> checked in</span>&nbsp;&nbsp;<span><b>${remaining}</b> remaining of ${total}</span>`,
        },
      };
      let LANG = "pl";
      try {
        const savedLang = localStorage.getItem("tg_lang");
        if (savedLang === "en" || savedLang === "pl") LANG = savedLang;
      } catch (e) {
        /* ignore */
      }
      function t(key, ...args) {
        const v = (I18N[LANG] && I18N[LANG][key]) ?? I18N.en[key] ?? key;
        return typeof v === "function" ? v(...args) : v;
      }
      function applyStaticI18n() {
        document.documentElement.lang = LANG;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.textContent = t(el.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
          el.setAttribute("placeholder", t(el.dataset.i18nPh));
        });
        const lt = document.getElementById("lang-toggle");
        if (lt) lt.textContent = LANG === "pl" ? "EN" : "PL";
      }
      function setLang(l) {
        LANG = l === "en" ? "en" : "pl";
        try {
          localStorage.setItem("tg_lang", LANG);
        } catch (e) {
          /* ignore */
        }
        applyStaticI18n();
        renderStorageBanner();
        const appVisible = document.getElementById("app-content").style.display !== "none";
        if (appVisible) {
          const scan = document.getElementById("panel-scan");
          if (scan && scan.style.display !== "none") renderScanPanel();
          else renderGeneratePanel();
        }
      }

      function initFirebase() {
        if (firebaseConfig.apiKey.startsWith("PASTE_")) return false;
        try {
          firebase.initializeApp(firebaseConfig);
          db = firebase.firestore();
          firebaseReady = true;
          return true;
        } catch (e) {
          console.warn("Firebase init failed", e);
          return false;
        }
      }

      async function storageTest() {
        try {
          if (!firebaseReady) throw new Error("Firebase config not filled in yet, or Firestore not created");
          // quick round-trip to confirm rules/connection are working
          await db.collection("ticketguard").doc("selftest").set({ pingedAt: Date.now() });
          await db.collection("ticketguard").doc("selftest").get();
          STORAGE_MODE = "firebase";
        } catch (e) {
          STORAGE_MODE = "memory";
          console.warn("Firebase unavailable, using in-memory fallback:", e);
        }
        renderStorageBanner();
      }

      function renderStorageBanner() {
        const el = document.getElementById("storage-banner");
        if (!el) return;
        if (STORAGE_MODE === "memory") {
          el.style.display = "block";
          el.textContent = t("storage_memory");
        } else {
          el.style.display = "none";
        }
      }

      // Mirror small key-value docs (the events index) into localStorage too, so the
      // event list is still there for a fully-offline COLD START - without it, the
      // scan dropdown would be empty and staff couldn't even pick the event.
      function lsGet(key) {
        try {
          const v = localStorage.getItem("tg_kv_" + key);
          return v ? JSON.parse(v) : null;
        } catch (e) {
          return null;
        }
      }
      function lsSet(key, value) {
        try {
          localStorage.setItem("tg_kv_" + key, JSON.stringify(value));
        } catch (e) {}
      }

      // low-level storage with fallback
      async function storeGet(key) {
        if (STORAGE_MODE === "memory") return lsGet(key) ?? memoryStore[key] ?? null;
        try {
          const doc = await db.collection("ticketguard").doc(key).get();
          const val = doc.exists ? doc.data().value : null;
          if (val !== null) lsSet(key, val); // refresh the offline mirror
          return val !== null ? val : lsGet(key);
        } catch (e) {
          console.warn("Read failed, falling back to cached/memory for", key, e);
          return lsGet(key) ?? memoryStore[key] ?? null;
        }
      }
      async function storeSet(key, value) {
        lsSet(key, value); // always mirror for offline use
        if (STORAGE_MODE === "memory") {
          memoryStore[key] = value;
          return;
        }
        try {
          await db.collection("ticketguard").doc(key).set({ value, updatedAt: Date.now() });
        } catch (e) {
          console.warn("Write failed, falling back to memory for", key, e);
          STORAGE_MODE = "memory";
          memoryStore[key] = value;
          renderStorageBanner();
        }
      }

      // ---------- storage helpers ----------
      // Events list stays as one small document - only ever written by whoever is
      // generating tickets, so there's no concurrent-writer risk there.
      async function getEvents() {
        const v = await storeGet("events-index");
        try {
          return v ? JSON.parse(v) : [];
        } catch (e) {
          return [];
        }
      }
      async function saveEvents(list) {
        await storeSet("events-index", JSON.stringify(list));
      }

      // Tickets are stored ONE PER DOCUMENT (not as one shared array) specifically
      // so that two scanner phones checking in different tickets at the same
      // moment never overwrite each other's work.
      async function createTickets(eventId, tickets) {
        if (STORAGE_MODE === "firebase") {
          const batch = db.batch();
          tickets.forEach((t) => {
            batch.set(db.collection("ticketguard_tickets").doc(t.id), {
              eventId,
              num: t.num,
              shortCode: t.shortCode,
              used: false,
              usedAt: null,
            });
          });
          await batch.commit();
        } else {
          tickets.forEach((t) => {
            memoryStore["ticket:" + t.id] = { eventId, num: t.num, shortCode: t.shortCode, used: false, usedAt: null };
          });
        }
      }

      async function getTickets(eventId) {
        if (STORAGE_MODE === "firebase") {
          try {
            const snap = await db.collection("ticketguard_tickets").where("eventId", "==", eventId).get();
            const list = [];
            snap.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
            list.sort((a, b) => a.num - b.num);
            return list;
          } catch (e) {
            console.warn("Ticket read failed, falling back to memory", e);
          }
        }
        return Object.keys(memoryStore)
          .filter((k) => k.startsWith("ticket:") && memoryStore[k].eventId === eventId)
          .map((k) => ({ id: k.slice(7), ...memoryStore[k] }))
          .sort((a, b) => a.num - b.num);
      }

      // Delete an event and all of its ticket documents, plus any offline cache.
      async function deleteEvent(eventId) {
        const tickets = await getTickets(eventId);
        if (STORAGE_MODE === "firebase") {
          const batch = db.batch();
          tickets.forEach((t) => batch.delete(db.collection("ticketguard_tickets").doc(t.id)));
          await batch.commit();
        } else {
          tickets.forEach((t) => {
            delete memoryStore["ticket:" + t.id];
          });
        }
        const events = (await getEvents()).filter((e) => e.id !== eventId);
        await saveEvents(events);
        try {
          localStorage.removeItem("tg_scan_" + eventId);
        } catch (e) {
          /* ignore */
        }
      }

      // Atomic "mark this one ticket used, only if it isn't already" - safe even
      // if two phones scan two different tickets, or (rarer) the same ticket, in
      // the same instant. Returns one of: ok / used / unknown / offline.
      async function tryCheckIn(ticketId) {
        if (STORAGE_MODE !== "firebase") return { status: "offline", reason: "network" };
        try {
          const ref = db.collection("ticketguard_tickets").doc(ticketId);
          return await db.runTransaction(async (tx) => {
            const doc = await tx.get(ref);
            if (!doc.exists) return { status: "unknown" };
            const data = doc.data();
            if (data.used) return { status: "used", num: data.num, usedAt: data.usedAt };
            const now = new Date().toISOString();
            tx.update(ref, { used: true, usedAt: now });
            return { status: "ok", num: data.num, usedAt: now };
          });
        } catch (e) {
          // Tell a real outage apart from a sign-in/rules problem - the latter
          // won't fix itself just because wifi comes back, and staff deserve to
          // know that rather than being told "will sync once reconnected" forever.
          const isAuthIssue = e && (e.code === "permission-denied" || e.code === "unauthenticated");
          console.warn("Live check-in failed, falling back to offline mode", e);
          return { status: "offline", reason: isAuthIssue ? "auth" : "network" };
        }
      }

      function uid() {
        if (crypto.randomUUID) return crypto.randomUUID().slice(0, 8).toUpperCase();
        return Math.random().toString(36).slice(2, 10).toUpperCase();
      }

      // Short random code for the fully-analog fallback path. Deliberately NOT
      // derived from the ticket number (which is sequential and guessable) - this
      // is what a librarian checks by eye when there's no phone/app at all, so it
      // needs to actually require having seen a real ticket, not just a plausible
      // number in range. Ambiguous characters (0/O, 1/I) are excluded so it's easy
      // to read and hand-write correctly.
      const CODE_ALPHABET = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      function genShortCode() {
        // Use a cryptographic RNG rather than Math.random(). The alphabet is 32 chars
        // and 256 is an exact multiple of 32, so a plain modulo is unbiased.
        const bytes = new Uint8Array(5);
        crypto.getRandomValues(bytes);
        let s = "";
        for (let i = 0; i < 5; i++) s += CODE_ALPHABET[bytes[i] % CODE_ALPHABET.length];
        return s;
      }

      // ---------- tabs ----------
      document.querySelectorAll(".tab").forEach((t) => {
        t.addEventListener("click", () => {
          haltCamera(); // always release the camera before switching views, whichever tab was active
          stopTicketRefresh(); // and stop the tickets-view poll
          document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
          t.classList.add("active");
          const tab = t.dataset.tab;
          document.getElementById("panel-generate").style.display = tab === "generate" ? "block" : "none";
          document.getElementById("panel-scan").style.display = tab === "scan" ? "block" : "none";
          if (tab === "scan") renderScanPanel();
        });
      });

      // ================= GENERATE PANEL =================
      async function renderGeneratePanel() {
        stopTicketRefresh(); // the tickets view (and its poll) is about to be replaced
        const el = document.getElementById("panel-generate");
        const events = await getEvents();

        el.innerHTML = `
    <div class="card">
      <label>${t("new_event_name")}</label>
      <input type="text" id="ev-name" placeholder="${t("event_name_ph")}">
      <label>${t("num_tickets")}</label>
      <input type="number" id="ev-count" min="1" max="500" value="50">
      <button class="btn-primary" id="btn-create-event">${t("create_event")}</button>
      <div id="gen-status" style="margin-top:10px;font-size:13px;min-height:18px;"></div>
    </div>
    <div id="events-list"></div>
    <div id="tickets-output"></div>
  `;

        const statusEl = document.getElementById("gen-status");
        const setStatus = (msg, isError) => {
          statusEl.textContent = msg || "";
          statusEl.style.color = isError ? "var(--stamp-red)" : "#6b6455";
        };

        document.getElementById("btn-create-event").onclick = async () => {
          const name = document.getElementById("ev-name").value.trim().slice(0, 120);
          const count = Math.max(1, Math.min(500, parseInt(document.getElementById("ev-count").value) || 0));
          if (!name) {
            setStatus(t("name_first"), true);
            return;
          }
          const btn = document.getElementById("btn-create-event");
          btn.disabled = true;
          btn.textContent = t("generating");
          setStatus(t("creating_tickets"), false);

          const eventId = uid() + "-" + Date.now().toString(36);
          const tickets = [];
          const usedCodes = new Set();
          for (let i = 1; i <= count; i++) {
            let code = genShortCode();
            while (usedCodes.has(code)) code = genShortCode(); // vanishingly rare, but keep codes unique within this event
            usedCodes.add(code);
            tickets.push({ id: uid() + uid(), num: i, shortCode: code, used: false, usedAt: null });
          }
          const ev = { id: eventId, name, count, createdAt: new Date().toISOString() };

          try {
            await createTickets(eventId, tickets);
            const events = await getEvents();
            events.unshift(ev);
            await saveEvents(events);
            setStatus(t("done_created", count), false);
            renderGeneratePanel();
            renderTicketsForPrint(ev, tickets);
          } catch (e) {
            setStatus(t("could_not_save", e && e.message ? e.message : String(e)), true);
            btn.disabled = false;
            btn.textContent = t("create_event");
          }
        };

        const listEl = document.getElementById("events-list");
        if (events.length === 0) {
          listEl.innerHTML = `<div class="empty">${t("no_events_gen")}</div>`;
        } else {
          listEl.innerHTML =
            `<h3 style="margin-bottom:10px;font-size:16px;">${t("past_events")}</h3>` +
            events
              .map(
                (ev) => `
        <div class="event-row" data-id="${ev.id}">
          <div>
            <div style="font-weight:600;">${escapeHtml(ev.name)}</div>
            <div class="meta">${t("event_meta", ev.count, new Date(ev.createdAt).toLocaleDateString())}</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="meta">${t("view")}</span>
            <button class="btn-delete-event" data-id="${ev.id}" title="${t("delete_title")}"
              style="background:transparent;border:1.5px solid var(--stamp-red);color:var(--stamp-red);padding:6px 10px;font-size:13px;">${t("delete")}</button>
          </div>
        </div>
      `,
              )
              .join("");
          listEl.querySelectorAll(".event-row").forEach((row) => {
            row.addEventListener("click", async () => {
              const ev = events.find((e) => e.id === row.dataset.id);
              const tickets = await getTickets(ev.id);
              renderTicketsForPrint(ev, tickets);
            });
          });
          listEl.querySelectorAll(".btn-delete-event").forEach((btn) => {
            btn.addEventListener("click", async (e) => {
              e.stopPropagation(); // don't also open the event's ticket view
              const ev = events.find((x) => x.id === btn.dataset.id);
              if (!ev) return;
              if (!confirm(t("confirm_delete", ev.name, ev.count))) return;
              btn.disabled = true;
              btn.textContent = t("deleting");
              await deleteEvent(ev.id);
              const out = document.getElementById("tickets-output");
              if (out) out.innerHTML = "";
              renderGeneratePanel();
            });
          });
        }
      }

      function escapeHtml(s) {
        return s.replace(
          /[&<>"']/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c],
        );
      }

      function renderTicketsForPrint(ev, tickets) {
        const out = document.getElementById("tickets-output");
        const usedCount = tickets.filter((t) => t.used).length;
        out.innerHTML = `
    <div class="card no-print">
      <h3>${escapeHtml(ev.name)}</h3>
      <div class="stats">
        <span><b id="stat-total">${tickets.length}</b> ${t("total")}</span>
        <span><b id="stat-used">${usedCount}</b> ${t("checked_in")}</span>
        <span><b id="stat-remaining">${tickets.length - usedCount}</b> ${t("remaining")}</span>
        <button class="btn-secondary" id="btn-refresh-tickets" style="margin-left:auto;padding:6px 12px;font-size:13px;">${t("refresh")}</button>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px;align-items:end;flex-wrap:wrap;">
        <div>
          <label style="margin-bottom:4px;">${t("from_num")}</label>
          <input type="number" id="range-from" min="1" max="${tickets.length}" value="1" style="width:90px;margin-bottom:0;">
        </div>
        <div>
          <label style="margin-bottom:4px;">${t("to_num")}</label>
          <input type="number" id="range-to" min="1" max="${tickets.length}" value="${Math.min(10, tickets.length)}" style="width:90px;margin-bottom:0;">
        </div>
        <button class="btn-secondary" id="btn-print-range">${t("print_range")}</button>
        <button class="btn-secondary" id="btn-print-all">${t("print_all")}</button>
      </div>
      <div style="font-size:12px;color:#8a8272;margin-top:8px;">${t("batch_hint")}</div>
      <button class="btn-secondary" style="margin-top:14px;" id="btn-backup-list">${t("backup_btn")}</button>
      <div style="font-size:12px;color:#8a8272;margin-top:8px;">${t("backup_hint")}</div>
    </div>
    <div class="ticket-grid" id="ticket-grid"></div>
  `;
        document.getElementById("btn-backup-list").onclick = () => downloadBackupList(ev, tickets);
        document.getElementById("btn-print-all").onclick = () => {
          drawTicketGrid(ev, tickets);
          window.print();
        };
        document.getElementById("btn-print-range").onclick = () => {
          const from = parseInt(document.getElementById("range-from").value) || 1;
          const to = parseInt(document.getElementById("range-to").value) || from;
          const subset = tickets.filter((t) => t.num >= from && t.num <= to);
          if (subset.length === 0) {
            return;
          }
          drawTicketGrid(ev, subset);
          window.print();
        };
        document.getElementById("btn-refresh-tickets").onclick = () => refreshTicketStates(ev, tickets);
        drawTicketGrid(ev, tickets);

        // Keep this view current while it's open: the grid is a snapshot, so
        // poll for check-ins and update the marks/counts in place (no QR redraw).
        stopTicketRefresh();
        ticketRefreshTimer = setInterval(() => refreshTicketStates(ev, tickets), 5000);
      }

      let ticketRefreshTimer = null;
      function stopTicketRefresh() {
        if (ticketRefreshTimer) {
          clearInterval(ticketRefreshTimer);
          ticketRefreshTimer = null;
        }
      }
      // Update used-marks and counts from the live data without redrawing QR codes.
      async function refreshTicketStates(ev, tickets) {
        const grid = document.getElementById("ticket-grid");
        if (!grid) {
          stopTicketRefresh();
          return;
        }
        let fresh;
        try {
          fresh = await getTickets(ev.id);
        } catch (e) {
          return; // transient; try again on the next tick
        }
        const byId = new Map(fresh.map((x) => [x.id, x]));
        // reflect into the snapshot so a subsequent print is accurate too
        if (Array.isArray(tickets)) {
          tickets.forEach((tk) => {
            const f = byId.get(tk.id);
            if (f) {
              tk.used = f.used;
              tk.usedAt = f.usedAt;
            }
          });
        }
        grid.querySelectorAll(".ticket").forEach((card) => {
          const f = byId.get(card.dataset.id);
          const used = f ? !!f.used : false;
          card.classList.toggle("used", used);
          let stamp = card.querySelector(".used-stamp");
          if (used && !stamp) {
            stamp = document.createElement("div");
            stamp.className = "used-stamp";
            stamp.textContent = t("used_stamp");
            card.appendChild(stamp);
          } else if (!used && stamp) {
            stamp.remove();
          }
        });
        const usedCount = fresh.filter((x) => x.used).length;
        const setNum = (id, n) => {
          const el = document.getElementById(id);
          if (el) el.textContent = n;
        };
        setNum("stat-total", fresh.length);
        setNum("stat-used", usedCount);
        setNum("stat-remaining", fresh.length - usedCount);
      }

      function drawTicketGrid(ev, tickets) {
        const grid = document.getElementById("ticket-grid");
        grid.innerHTML = "";
        tickets.forEach((ticket) => {
          const wrap = document.createElement("div");
          wrap.className = "ticket" + (ticket.used ? " used" : "");
          wrap.dataset.id = ticket.id;
          wrap.innerHTML = `<div class="ticket-label">${t("ticket_no")}</div><div class="num">${String(ticket.num).padStart(3, "0")}</div><div class="code">${ticket.shortCode || ""}</div><div class="qr"></div><div class="event-name">${escapeHtml(ev.name)}</div>`;
          if (ticket.used) {
            const stamp = document.createElement("div");
            stamp.className = "used-stamp";
            stamp.textContent = t("used_stamp");
            wrap.appendChild(stamp);
          }
          grid.appendChild(wrap);
          new QRCode(wrap.querySelector(".qr"), {
            text: JSON.stringify({ e: ev.id, t: ticket.id }),
            width: 120,
            height: 120,
            colorDark: "#1D2B36",
            colorLight: "#F7F3E9",
          });
        });
      }

      function downloadBackupList(ev, tickets) {
        const rows = [...tickets]
          .sort((a, b) => a.num - b.num)
          .map((ticket) => t("backup_row", String(ticket.num).padStart(3, "0"), ticket.shortCode || "?????"))
          .join("\n");
        const content = `${ev.name}\n${t("backup_intro", new Date().toLocaleString(), tickets.length)}\n\n` + rows;
        const blob = new Blob([content], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = ev.name.replace(/[^a-z0-9]+/gi, "-") + "-backup-list.txt";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      // ================= SCAN PANEL =================
      // Online-only verdicts: a ticket is ONLY ever declared valid or already-used
      // by the shared database (the tryCheckIn transaction). With no connection the
      // app does NOT guess from a cache - it says "can't verify, use the paper
      // list". This keeps the exactly-once guarantee absolute and removes any
      // chance of two devices disagreeing.
      let scanStream = null,
        scanRAF = null,
        currentEventId = null;
      let localTickets = null; // event ticket list for stats/labels only (never a verdict source)

      // ---------- repeat-attempt log (per device, per event) ----------
      // A glance-able history of tickets that were scanned again AFTER already
      // being used. This does not affect entry (the red "already used" banner
      // already blocks that on every device) - it is just a local record for the
      // librarian at this device. Persisted per event so it survives a reload.
      let reuseAttempts = [];
      function attemptsKey(eventId) {
        return "tg_attempts_" + eventId;
      }
      function loadAttempts(eventId) {
        try {
          const raw = localStorage.getItem(attemptsKey(eventId));
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch (e) {
          return [];
        }
      }
      function saveAttempts() {
        if (!currentEventId) return;
        try {
          localStorage.setItem(attemptsKey(currentEventId), JSON.stringify(reuseAttempts));
        } catch (e) {
          /* non-fatal */
        }
      }
      function recordReuseAttempt(id, num, code) {
        const now = Date.now();
        const existing = reuseAttempts.find((a) => a.id === id);
        if (existing) {
          // Ignore the same ticket held in front of the camera (decoded repeatedly).
          if (now - existing.lastTs < 5000) return;
          existing.count++;
          existing.lastTs = now;
          reuseAttempts = [existing, ...reuseAttempts.filter((a) => a.id !== id)];
        } else {
          reuseAttempts.unshift({ id, num: num == null ? "?" : num, code: code || "", count: 1, lastTs: now });
        }
        saveAttempts();
        renderAttemptsList();
      }
      function renderAttemptsList() {
        const el = document.getElementById("attempts-panel");
        if (!el) return;
        if (!reuseAttempts.length) {
          el.style.display = "none";
          el.innerHTML = "";
          return;
        }
        el.style.display = "block";
        el.innerHTML =
          `<div style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#8a8272;margin-bottom:6px;">${t("attempts_title")}</div>` +
          reuseAttempts
            .map(
              (a) =>
                `<div style="font-size:13px;color:var(--stamp-red);padding:2px 0;">${escapeHtml(
                  t(
                    "attempts_entry",
                    String(a.num).padStart(3, "0"),
                    a.code || "?????",
                    a.count,
                    new Date(a.lastTs).toLocaleTimeString(),
                  ),
                )}</div>`,
            )
            .join("");
      }

      async function renderScanPanel() {
        const el = document.getElementById("panel-scan");
        const events = await getEvents();
        el.innerHTML = `
    <div class="card">
      <label>${t("which_event")}</label>
      <select id="scan-event" style="width:100%;padding:12px;border-radius:6px;border:1.5px solid var(--oat-deep);font-size:16px;background:var(--paper);margin-bottom:14px;">
        <option value="">${t("choose_event")}</option>
        ${events.map((ev) => `<option value="${ev.id}">${escapeHtml(ev.name)}</option>`).join("")}
      </select>
      <button class="btn-primary" id="btn-start-scan">${t("start_camera")}</button>
    </div>
    <div id="scan-area"></div>
  `;
        if (events.length === 0) {
          el.querySelector(".card").innerHTML +=
            `<div class="empty" style="padding:10px 0 0;">${t("no_events_scan")}</div>`;
        }
        document.getElementById("btn-start-scan").onclick = startScanning;
      }

      async function startScanning() {
        const sel = document.getElementById("scan-event");
        currentEventId = sel.value;
        if (!currentEventId) {
          const area = document.getElementById("scan-area");
          area.innerHTML = `<div class="result-banner invalid" style="display:block;">${t("pick_event_first")}</div>`;
          return;
        }
        // Fresh session: release any previous camera loop.
        haltCamera();
        // Load this device's repeat-attempt history for the event (accumulates
        // across stop/start and reloads).
        reuseAttempts = loadAttempts(currentEventId);

        const area = document.getElementById("scan-area");
        area.innerHTML = `
    <div class="scan-stage">
      <video id="scan-video" playsinline autoplay muted></video>
      <div class="scan-frame"></div>
    </div>
    <div class="result-banner" id="result-banner"></div>
    <div class="stats" id="scan-stats" style="justify-content:center;"></div>
    <div id="attempts-panel" class="no-print" style="max-width:420px;margin:14px auto 0;display:none;"></div>
    <div style="text-align:center;margin-top:14px;">
      <button class="btn-secondary" id="btn-stop-scan">${t("stop_camera")}</button>
    </div>
  `;
        document.getElementById("btn-stop-scan").onclick = stopScanning;
        renderAttemptsList();

        // Load the event's ticket list for stats/labels only. It is NEVER used to
        // decide a verdict - only tryCheckIn (the DB) does that.
        localTickets = await getTickets(currentEventId);
        lastDecodeTime = 0;
        lastDecodeData = null;

        // Grey out "Start camera" while a session is running; the "Stop camera"
        // button below ends it (and re-renders an enabled Start button).
        const startBtn = document.getElementById("btn-start-scan");
        if (startBtn) startBtn.disabled = true;

        const video = document.getElementById("scan-video");
        try {
          scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          video.srcObject = scanStream;
          await video.play();
          tick(video);
        } catch (e) {
          if (startBtn) startBtn.disabled = false; // let them retry
          area.innerHTML = `<div class="result-banner invalid" style="display:block;">${t("camera_unavailable")}<div class="sub">${escapeHtml(e.message || t("camera_denied"))}</div></div>`;
        }
        updateStats();
      }

      function haltCamera() {
        if (scanRAF) {
          cancelAnimationFrame(scanRAF);
          scanRAF = null;
        }
        if (scanStream) {
          scanStream.getTracks().forEach((tr) => tr.stop());
          scanStream = null;
        }
      }

      function stopScanning() {
        haltCamera();
        renderScanPanel();
      }

      const canvasEl = document.createElement("canvas");
      const ctx = canvasEl.getContext("2d", { willReadFrequently: true });
      let lastDecodeTime = 0;
      let lastDecodeData = null;

      function tick(video) {
        if (!scanStream) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvasEl.width = video.videoWidth;
          canvasEl.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvasEl.width, canvasEl.height);
          const imgData = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
          const code = jsQR(imgData.data, imgData.width, imgData.height);
          const now = Date.now();
          // Debounce REPEATS of the same code (the camera decodes the same ticket many
          // times a second), but let a DIFFERENT ticket through immediately so a busy
          // door never silently drops the next guest.
          if (code && (code.data !== lastDecodeData || now - lastDecodeTime > 1200)) {
            lastDecodeTime = now;
            lastDecodeData = code.data;
            handleScan(code.data);
          }
        }
        scanRAF = requestAnimationFrame(() => tick(video));
      }

      // A real ticket id is uid()+uid() - uppercase alphanumerics. Reject anything
      // else up front (missing id, path traversal, slashes, oversized strings, or a
      // non-string) rather than passing it to Firestore's .doc() and interpreting the
      // resulting error as a network outage.
      const TICKET_ID_RE = /^[A-Za-z0-9]{4,64}$/;
      function handleScan(payload) {
        let parsed;
        try {
          parsed = JSON.parse(payload);
        } catch (e) {
          showResult(false, t("not_ticketguard"), t("not_ticketguard_sub"));
          return;
        }

        if (!parsed || typeof parsed !== "object") {
          showResult(false, t("not_ticketguard"), t("not_ticketguard_sub"));
          return;
        }
        if (parsed.e !== currentEventId) {
          showResult(false, t("wrong_event"), t("wrong_event_sub"));
          return;
        }
        if (typeof parsed.t !== "string" || !TICKET_ID_RE.test(parsed.t)) {
          showResult(false, t("not_ticketguard"), t("malformed_sub"));
          return;
        }
        processCheckIn(parsed.t);
      }

      async function processCheckIn(ticketId) {
        // The database transaction is the ONLY thing that decides a verdict. This
        // is what keeps two or three phones at the same door from ever both
        // accepting the same ticket - the DB resolves it, not any phone's memory.
        const result = await tryCheckIn(ticketId);

        if (result.status === "ok") {
          showResult(true, t("valid_welcome"), t("checked_in_num", String(result.num).padStart(3, "0")));
          bumpLocalCount();
          return;
        }
        if (result.status === "used") {
          const when = result.usedAt ? new Date(result.usedAt).toLocaleTimeString() : "earlier";
          showResult(false, t("already_used"), t("checked_at", when));
          const lt = localTickets && localTickets.find((x) => x.id === ticketId);
          recordReuseAttempt(ticketId, result.num != null ? result.num : lt && lt.num, lt && lt.shortCode);
          return;
        }
        if (result.status === "unknown") {
          showResult(false, t("unknown_ticket"), t("unknown_ticket_sub"));
          return;
        }

        // status === 'offline': we cannot reach the database, so we CANNOT verify
        // this ticket. We never guess - staff fall back to the printed backup list.
        const sub = result.reason === "auth" ? t("cant_verify_auth") : t("cant_verify_sub");
        showResult(false, t("cant_verify"), sub);
      }

      function bumpLocalCount() {
        updateStats(); // fire-and-forget refresh; doesn't block the next scan
      }

      async function updateStats() {
        if (!currentEventId) return;
        const statsEl = document.getElementById("scan-stats");
        if (!statsEl) return;
        // Prefer a fresh live count; fall back to the local cache if offline.
        let tickets = localTickets;
        if (STORAGE_MODE === "firebase") {
          try {
            tickets = await getTickets(currentEventId);
          } catch (e) {
            /* keep local */
          }
        }
        const used = tickets.filter((x) => x.used).length;
        statsEl.innerHTML = t("stats_line", used, tickets.length - used, tickets.length);
      }

      function showResult(valid, title, sub) {
        const banner = document.getElementById("result-banner");
        if (!banner) return;
        banner.className = "result-banner " + (valid ? "valid" : "invalid");
        banner.innerHTML = `${title}<div class="sub">${sub}</div>`;
      }

      // ============ AUTH ============
      initFirebase();

      document.getElementById("btn-login").onclick = async () => {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const statusEl = document.getElementById("login-status");
        statusEl.textContent = "";
        if (!firebaseReady) {
          statusEl.textContent = t("not_configured");
          return;
        }
        if (!email || !password) {
          statusEl.textContent = t("enter_both");
          return;
        }
        try {
          await firebase.auth().signInWithEmailAndPassword(email, password);
        } catch (e) {
          statusEl.textContent = e.message || t("signin_failed");
        }
      };

      // Language toggle (top bar): swap PL <-> EN and re-render visible text.
      applyStaticI18n();
      document.getElementById("lang-toggle").onclick = () => setLang(LANG === "pl" ? "en" : "pl");

      if (firebaseReady) {
        firebase.auth().onAuthStateChanged(async (user) => {
          if (user) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("app-content").style.display = "block";
            document.getElementById("topbar-right").innerHTML =
              escapeHtml(user.email) +
              ' &nbsp; <a href="#" id="btn-logout" data-i18n="signout" style="color:inherit;">Sign out</a>';
            document.getElementById("btn-logout").onclick = (e) => {
              e.preventDefault();
              firebase.auth().signOut();
            };
            await storageTest();
            renderGeneratePanel();
          } else {
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("app-content").style.display = "none";
          }
        });
      } else {
        document.getElementById("login-status").textContent =
          "Firebase isn\u2019t configured yet - paste your config near the top of the file.";
      }
    </script>
  </body>
</html>
